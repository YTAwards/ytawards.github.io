<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTAwards 2026 – Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center p-6 bg-gradient-to-tr from-slate-950 via-red-950/20 to-slate-950">

    <div class="w-full max-w-md bg-slate-900/80 border border-slate-800 rounded-2xl p-6 shadow-2xl">
        <p class="text-xs font-bold tracking-widest uppercase text-red-400 mb-2">🚨 Internes Kontrollzentrum</p>
        <h1 class="text-2xl font-extrabold tracking-wide mb-6">Voter Stimmen zurücksetzen</h1>

        <div class="space-y-4">
            <div>
                <label class="block text-xs uppercase tracking-wider text-slate-400 mb-2 font-semibold">Voter-ID (aus Discord)</label>
                <input type="text" id="target-id" placeholder="z.B. VOTER-A8X3K2L" 
                       class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-yellow-400 font-mono tracking-wide focus:outline-none focus:border-red-500 transition-colors">
            </div>

            <button onclick="triggerReset()" 
                    class="w-full bg-gradient-to-r from-red-600 to-pink-600 hover:from-red-500 hover:to-pink-500 font-bold py-3 rounded-xl transition-all shadow-[0_0_20px_rgba(220,38,38,0.2)] hover:shadow-[0_0_25px_rgba(220,38,38,0.4)] active:scale-98 cursor-pointer">
                Stimmen der ID freigeben
            </button>
        </div>

        <div id="status-msg" class="mt-4 text-sm text-center font-medium hidden"></div>
    </div>

<script>
    // Nutzt dieselbe kostenlose API wie die Hauptseite (Ersetze 'dein_voting_projekt' mit einem geheimen Wort)
    const API_BASE = "https://kvdb.io/YTAwards2026_SecretNamespace/";

    async function triggerReset() {
        const input = document.getElementById('target-id');
        const id = input.value.trim().toUpperCase();
        const status = document.getElementById('status-msg');

        if (!id) {
            alert('Bitte eine gültige Voter-ID eingeben!');
            return;
        }

        status.className = "mt-4 text-sm text-center font-medium text-yellow-400 animate-pulse";
        status.textContent = `Sende Reset-Signal für ${id}...`;
        status.classList.remove('hidden');

        try {
            // Wir hinterlegen auf der API, dass diese ID gelöscht werden soll
            const response = await fetch(`${API_BASE}${id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reset: true })
            });

            if (response.ok) {
                status.className = "mt-4 text-sm text-center font-medium text-emerald-400";
                status.textContent = `Erfolg! ID ${id} wird beim nächsten Seitenaufruf entsperrt.`;
                input.value = '';
            } else {
                throw new Error();
            }
        } catch (error) {
            status.className = "mt-4 text-sm text-center font-medium text-red-400";
            status.textContent = "Fehler beim Senden des Signals.";
        }
    }
</script>
</body>
</html>
