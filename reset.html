<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTAwards 2026 – Lokaler Reset</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body id="main-body" class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center p-6 bg-gradient-to-tr from-slate-950 via-red-950/20 to-slate-950">

    <div id="loading-screen" class="text-center font-mono text-slate-400 text-xs tracking-widest animate-pulse">
        PRÜFE AUTORISIERUNG...
    </div>

    <div id="admin-panel" class="hidden w-full max-w-md bg-slate-900/80 border border-slate-800 rounded-2xl p-6 shadow-2xl text-center">
        <p class="text-xs font-bold tracking-widest uppercase text-red-400 mb-2">🔒 Admin Einmalpasswort</p>
        <h1 class="text-2xl font-extrabold tracking-wide mb-2">Stimmen lokal freigeben</h1>
        <p class="text-xs text-slate-400 mb-6 font-mono">ID dieses Geräts: <span id="current-id" class="text-yellow-400 font-bold">-</span></p>

        <div class="space-y-4 text-left">
            <div>
                <label class="block text-xs uppercase tracking-wider text-slate-400 mb-2 font-semibold">Stündlich wechselndes Passwort</label>
                <input type="password" id="admin-password" placeholder="Passwort eingeben" 
                       class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-center text-xl font-mono tracking-widest text-red-400 focus:outline-none focus:border-red-500 transition-colors">
            </div>

            <button onclick="verifyAndReset()" 
                    class="w-full bg-gradient-to-r from-red-600 to-pink-600 hover:from-red-500 hover:to-pink-500 font-bold py-3 rounded-xl transition-all shadow-[0_0_20px_rgba(220,38,38,0.2)] hover:shadow-[0_0_25px_rgba(220,38,38,0.4)] active:scale-98 cursor-pointer text-center">
                Dieses Gerät entsperren
            </button>
        </div>
    </div>

    <div id="forbidden-screen" class="hidden text-center max-w-lg px-4">
        <h1 class="text-9xl font-black text-red-600 font-mono tracking-widest drop-shadow-[0_0_20px_rgba(220,38,38,0.3)]">403</h1>
        <h2 class="text-2xl font-bold uppercase tracking-wide mt-4 mb-2 text-slate-200">Zugriff verweigert / Forbidden</h2>
        <p class="text-slate-500 text-sm font-mono mb-6">You don't have permission to access this resource on this server.</p>
        <a href="index.html" class="inline-block bg-slate-900 border border-slate-800 hover:border-slate-700 text-xs uppercase tracking-wider font-semibold px-6 py-2.5 rounded-xl transition-colors">
            Zurück zur Startseite
        </a>
    </div>

<script>
    const SECRET_SALT = "MeinSuperGeheimesBasisWort123!"; 
    // DEINE WHITELIST-IP
    const ADMIN_IP = "2001:4860:7:1710::e2"; 

    async function checkSecurityAndIP() {
        let userIp = "";
        
        try {
            // Holt die aktuelle IP des Geräts (unterstützt IPv4 und IPv6)
            const res = await fetch("https://api64.ipify.org?format=json");
            const data = await res.json();
            userIp = data.ip.trim().toLowerCase();
        } catch (e) {
            console.error("IP-Check fehlgeschlagen, fahre mit lokalem Speicher-Check fort.");
        }

        document.getElementById('loading-screen').remove();

        // Wenn es DEINE IP ist -> Voller Zugriff, ignoriere alle Sperren!
        if (userIp === ADMIN_IP.toLowerCase()) {
            showAdminPanel();
            console.log("⚡ Admin-IP erkannt. Zugriff gewährt.");
            return;
        }

        // Wenn es NICHT deine IP ist -> Prüfe, ob das Gerät bereits gesperrt wurde
        if (localStorage.getItem('admin_reset_done') === 'true') {
            showForbiddenScreen();
        } else {
            showAdminPanel();
        }
    }

    function showAdminPanel() {
        document.getElementById('admin-panel').classList.remove('hidden');
        const voterId = localStorage.getItem('voter_fingerprint_id') || 'Keine ID vorhanden';
        document.getElementById('current-id').textContent = voterId;
    }

    function showForbiddenScreen() {
        document.getElementById('forbidden-screen').classList.remove('hidden');
        document.getElementById('main-body').className = "bg-black text-white min-h-screen flex flex-col items-center justify-center font-sans";
    }

    function generateHourlyPassword() {
        const now = new Date();
        const timeString = `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}-${now.getHours()}`;
        const combined = timeString + SECRET_SALT;
        let hash = 0;
        for (let i = 0; i < combined.length; i++) {
            hash = (hash << 5) - hash + combined.charCodeAt(i);
            hash |= 0;
        }
        return "YTA-" + Math.abs(hash).toString().substring(0, 5);
    }

    function verifyAndReset() {
        const inputPass = document.getElementById('admin-password').value.trim();
        const correctPass = generateHourlyPassword();

        if (inputPass === correctPass) {
            localStorage.removeItem('usedVotesCount');
            
            const newId = 'VOTER-' + Math.random().toString(36).substring(2, 9).toUpperCase();
            localStorage.setItem('voter_fingerprint_id', newId);

            // Sperre für normale User brennen
            localStorage.setItem('admin_reset_done', 'true');

            alert('✅ Gerät erfolgreich entsperrt!');
            window.location.href = 'index.html'; 
        } else {
            alert('❌ Falsches Passwort! Zugriff verweigert.');
        }
    }

    // IP-Prüfung beim Laden starten
    checkSecurityAndIP();
    console.log("🔑 Passwort für diese Stunde:", generateHourlyPassword());
</script>
</body>
</html>
